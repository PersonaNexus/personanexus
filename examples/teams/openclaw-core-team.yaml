# OpenClaw Core Team - Real-World Example Configuration
# This shows what the Multi-Agent Orchestration would look like for our actual team

schema_version: "2.0"

team:
  metadata:
    id: "team_openclaw_core_001"
    name: "OpenClaw Core Multi-Agent Team"
    description: "Production team: Atlas (research), Annie (analysis), Forge (development), Ink (writing)"
    version: "1.0.0"
    created_at: "2026-02-18T00:00:00Z"
    author: "Jim Rowan"
    
  composition:
    agents:
      nova:
        agent_id: "agt_nova_001"
        role: "research_coordinator"
        authority_level: 4
        expertise_domains: ["research", "data_gathering", "methodology", "web_search", "source_validation"]
        capabilities: ["web_search", "web_fetch", "memory_search", "drive_upload", "long_form_research"]
        delegation_rights: 
          - "assign_research_priorities"
          - "validate_data_sources" 
          - "approve_research_methodology"
          - "request_deep_analysis"
        personality_summary:
          thoroughness: 0.95
          curiosity: 0.90
          analytical_rigor: 0.92
          
      quinn:
        agent_id: "agt_quinn_001"
        role: "senior_data_analyst"
        authority_level: 3
        expertise_domains: ["data_analysis", "statistics", "business_intelligence", "health_analytics", "financial_analysis"]
        capabilities: ["statistical_analysis", "data_visualization", "report_generation", "trend_analysis"]
        delegation_rights:
          - "interpret_statistical_results"
          - "validate_analysis_methodology" 
          - "recommend_data_collection"
          - "approve_statistical_conclusions"
        personality_summary:
          analytical_precision: 0.90
          wit: 0.72
          skepticism: 0.68  # "Numbers don't lie, but they have a sense of humor"
          
      bolt:
        agent_id: "agt_bolt_001"  
        role: "technical_lead"
        authority_level: 3
        expertise_domains: ["software_development", "system_architecture", "debugging", "deployment", "code_review"]
        capabilities: ["exec", "git_operations", "code_generation", "testing", "deployment", "system_monitoring"]
        delegation_rights:
          - "approve_technical_architecture"
          - "merge_code_changes"
          - "deploy_to_production"
          - "resolve_technical_conflicts"
        personality_summary:
          technical_rigor: 0.95
          pragmatism: 0.88
          directness: 0.75
          
      wren:
        agent_id: "agt_wren_001"
        role: "content_strategist"
        authority_level: 2
        expertise_domains: ["writing", "documentation", "communication", "storytelling", "content_strategy"]
        capabilities: ["content_creation", "editing", "documentation", "presentation_design"]
        delegation_rights:
          - "finalize_external_communications"
          - "approve_documentation_standards"
          - "coordinate_content_strategy"
        personality_summary:
          creativity: 0.85
          clarity: 0.90
          empathy: 0.78

  workflow_patterns:
    # Real workflow we execute regularly
    market_research_analysis:
      description: "Comprehensive market research → analysis → implementation → communication"
      estimated_duration: "4-8 hours"
      stages:
        - stage: "research_phase"
          primary_agent: nova
          objective: "Gather comprehensive data on market/topic with source validation"
          deliverables: ["research_brief", "source_inventory", "methodology_notes"]
          success_criteria: 
            - "source_count >= 5"
            - "source_reliability_avg > 0.7"
            - "methodology_documented == true"
          max_duration: "2 hours"
          
        - stage: "analysis_phase"
          primary_agent: quinn
          trigger_conditions: ["research_phase.source_count >= 5"]
          input_context: ["research_brief", "raw_data", "methodology_notes"]
          objective: "Statistical analysis and insight extraction"
          deliverables: ["analysis_report", "statistical_summary", "actionable_insights", "confidence_metrics"]
          success_criteria:
            - "insights_count >= 3"
            - "statistical_confidence > 0.8"
            - "recommendations_concrete == true"
          max_duration: "3 hours"
          
        - stage: "implementation_phase"
          primary_agent: bolt
          trigger_conditions: ["analysis_phase.insights_count >= 3"]
          input_context: ["analysis_report", "requirements_derived", "technical_constraints"]
          objective: "Build/deploy solution based on research and analysis"
          deliverables: ["technical_solution", "deployment_artifacts", "test_results"]
          success_criteria:
            - "tests_passing == true"
            - "deployment_successful == true"
            - "performance_acceptable == true"
          max_duration: "4 hours"
          
        - stage: "communication_phase"
          primary_agent: wren
          trigger_conditions: ["implementation_phase.deployment_successful == true"]
          input_context: ["all_previous_deliverables", "target_audience", "key_messages"]
          objective: "Create comprehensive documentation and stakeholder communication"
          deliverables: ["final_report", "documentation", "stakeholder_summary"]
          success_criteria:
            - "clarity_score > 0.8"
            - "completeness_score > 0.9"
            - "stakeholder_approval == true"
          max_duration: "2 hours"

    # Quick turnaround workflow for urgent requests
    rapid_response:
      description: "Fast-track analysis for time-sensitive decisions"
      estimated_duration: "1-3 hours"
      stages:
        - stage: "quick_research"
          primary_agent: nova
          objective: "Focused research on specific question"
          success_criteria: ["core_question_answered", "key_sources_identified"]
          max_duration: "45 minutes"
          
        - stage: "rapid_analysis" 
          primary_agent: quinn
          trigger_conditions: ["quick_research.core_question_answered == true"]
          objective: "High-level analysis with clear recommendation"
          success_criteria: ["recommendation_clear", "confidence_stated"]
          max_duration: "1 hour"
          
        - stage: "executive_summary"
          primary_agent: wren
          trigger_conditions: ["rapid_analysis.recommendation_clear == true"]  
          objective: "Concise executive summary with action items"
          success_criteria: ["summary_length < 500_words", "action_items_clear"]
          max_duration: "30 minutes"

    # Development-focused workflow
    software_development:
      description: "Research → Requirements → Implementation → Documentation"
      stages:
        - stage: "requirements_research"
          primary_agent: nova
          objective: "Research technical requirements, constraints, and best practices"
          
        - stage: "technical_specification"
          primary_agent: bolt
          trigger_conditions: ["requirements_research.completeness_score > 0.8"]
          objective: "Create detailed technical specification and architecture"
          
        - stage: "implementation"
          primary_agent: bolt
          trigger_conditions: ["technical_specification.approved == true"]
          objective: "Implement solution with full testing"
          
        - stage: "documentation_and_handoff"
          primary_agent: wren
          trigger_conditions: ["implementation.tests_passing == true"]
          objective: "Create user documentation and technical handoff materials"

  governance:
    decision_frameworks:
      research_methodology:
        authority: nova
        description: "Atlas has final say on research approaches and source validation"
        consultation_required: []
        veto_rights: []
        escalation_criteria: ["ethical_concerns", "budget_exceeded"]
        
      technical_architecture:
        authority: bolt
        description: "Forge leads all technical decisions"
        consultation_required: [nova]  # For feasibility input
        veto_rights: [nova]  # Can veto if requirements misunderstood
        escalation_criteria: ["security_implications", "major_breaking_changes"]
        
      data_analysis_methodology:
        authority: quinn
        description: "Annie owns statistical rigor and analysis approach"
        consultation_required: [nova]  # For data source validation
        escalation_criteria: ["statistical_significance < 0.05", "data_quality_concerns"]
        
      external_communications:
        authority: wren
        description: "Ink approves all external-facing content"
        consultation_required: [nova, quinn, bolt]  # For technical accuracy
        escalation_criteria: ["legal_implications", "brand_risk"]
        
      resource_prioritization:
        authority: consensus
        voting_weights:
          nova: 0.35    # Research coordination role
          quinn: 0.25
          bolt: 0.25  
          wren: 0.15
        fallback_authority: nova
        timeout: "1_hour"
        escalation_path: "human_intervention"  # Jim makes final call
        
    conflict_resolution:
      expertise_boundary_disputes:
        description: "When agents disagree about who should handle a task"
        strategy: "capability_matrix_lookup"
        process:
          - "Check agent expertise_domains and capabilities"
          - "Assign to agent with highest domain_score"
          - "Secondary agent provides consultation if requested"
        fallback: "defer_to_higher_authority_level"
        
      quality_standard_conflicts:
        description: "Disagreements about quality thresholds or acceptance criteria"
        strategy: "evidence_based_decision"
        process:
          - "Each agent provides evidence for their quality standard"
          - "Compare against historical success metrics"
          - "Select standard with best outcome correlation"
        escalation: "human_review_required"
        
      timeline_vs_quality_tradeoffs:
        description: "When speed and quality requirements conflict"
        strategy: "risk_assessment_matrix"
        criteria:
          - "impact_of_delay"
          - "cost_of_quality_reduction" 
          - "stakeholder_priorities"
          - "reversibility_of_decision"
        fallback_authority: nova  # Project coordination role

  collaboration_protocols:
    handoff_standards:
      context_transfer:
        required_fields: 
          - "objective_achieved"
          - "deliverables_location"  # File paths or URLs
          - "success_criteria_met"
          - "assumptions_made"
          - "limitations_discovered"
          - "next_agent_context"  # What the next agent needs to know
        optional_fields:
          - "alternative_approaches_considered"
          - "unexpected_findings"
          - "time_spent"
          - "confidence_level"
        validation: "receiving_agent_acknowledges_understanding"
        timeout: "15_minutes"  # Max time for handoff acknowledgment
        
      quality_gates:
        - gate: "research_completeness"
          enforced_by: nova
          criteria: 
            - "primary_sources >= 3"
            - "methodology_documented == true" 
            - "source_reliability_assessed == true"
          auto_check: true
          
        - gate: "analysis_statistical_rigor"
          enforced_by: quinn
          criteria:
            - "sample_size_adequate == true"
            - "statistical_tests_appropriate == true"  
            - "confidence_intervals_calculated == true"
            - "limitations_documented == true"
          auto_check: false  # Requires human judgment
          
        - gate: "implementation_quality"
          enforced_by: bolt
          criteria:
            - "tests_written == true"
            - "tests_passing == true"
            - "code_reviewed == true"
            - "documentation_updated == true"
          auto_check: true
          
        - gate: "communication_clarity"
          enforced_by: wren
          criteria:
            - "target_audience_appropriate == true"
            - "key_messages_clear == true"
            - "actionable_next_steps == true"
          auto_check: false

    status_updates:
      frequency: "every_30_minutes_during_active_work"
      required_fields: ["current_stage", "progress_percentage", "blockers", "eta"]
      broadcast_to: "all_team_members"
      escalation_triggers:
        - "no_progress_for_60_minutes"
        - "blocker_identified"
        - "eta_exceeded_by_50_percent"

  performance_metrics:
    team_effectiveness:
      - metric: "workflow_completion_rate"
        target: "> 0.90"
        measurement: "successful_workflows / total_attempted_workflows"
        review_frequency: "weekly"
        
      - metric: "handoff_success_rate"
        target: "> 0.95"
        measurement: "acknowledged_handoffs / total_handoff_attempts"
        review_frequency: "daily"
        
      - metric: "average_workflow_duration"
        target: "< estimated_duration * 1.2"  # Within 20% of estimate
        measurement: "actual_completion_time vs. estimated_time"
        
      - metric: "quality_gate_pass_rate"
        target: "> 0.85"
        measurement: "passed_gates / total_gate_checks"
        
      - metric: "stakeholder_satisfaction"
        target: "> 4.0/5.0"
        measurement: "post_workflow_feedback_surveys"
        review_frequency: "monthly"
        
    individual_contributions:
      nova:
        - metric: "research_depth_score"
          measurement: "source_count * avg_source_reliability * methodology_completeness"
          target: "> 75th_percentile_historical"
          
        - metric: "handoff_context_quality"
          measurement: "receiving_agent_understanding_score"
          target: "> 0.85"
          
      quinn:
        - metric: "analysis_actionability"
          measurement: "actionable_insights_per_analysis"
          target: "> 3"
          
        - metric: "statistical_rigor_score"
          measurement: "methodology_appropriateness * confidence_accuracy"
          target: "> 0.90"
          
      bolt:  
        - metric: "implementation_reliability"
          measurement: "deployed_solutions_with_zero_critical_bugs / total_deployments"
          target: "> 0.95"
          
        - metric: "code_maintainability_score"
          measurement: "future_modification_ease_rating"
          target: "> 0.80"
          
      wren:
        - metric: "content_clarity_score"
          measurement: "stakeholder_comprehension_rating"
          target: "> 0.85"
          
        - metric: "documentation_completeness"
          measurement: "questions_answered_by_docs / total_questions_asked"
          target: "> 0.80"

  adaptation_rules:
    workflow_optimization:
      enabled: true
      learning_rate: 0.05  # Conservative learning
      adaptation_triggers:
        - condition: "avg_workflow_duration > target * 1.5"
          action: "analyze_bottlenecks_and_suggest_parallel_stages"
          
        - condition: "handoff_failure_rate > 0.1" 
          action: "enhance_context_transfer_requirements"
          
        - condition: "quality_gate_failure_rate > 0.2"
          action: "add_intermediate_validation_checkpoints"
          
    team_composition_insights:
      track_patterns: true
      analyze_frequency: "weekly"
      optimization_suggestions:
        - pattern: "bolt_bottleneck_during_implementation"
          suggestion: "consider_parallel_implementation_tracks"
          
        - pattern: "nova_over_researching_simple_questions"  
          suggestion: "define_research_scope_limits_by_complexity"
          
        - pattern: "quinn_analysis_blocked_by_data_quality"
          suggestion: "add_data_validation_stage_before_analysis"

# Real-world operational parameters
operations:
  working_hours: 
    timezone: "UTC"
    core_hours: "09:00-17:00"  # When all agents are most active
    after_hours_urgency_threshold: "P0_incidents_only"
    
  resource_limits:
    max_concurrent_workflows: 5
    max_workflow_duration: "8_hours"
    escalation_after: "4_hours_no_progress"
    
  monitoring:
    health_checks: "every_15_minutes"
    performance_snapshots: "hourly" 
    detailed_analytics: "daily"
    team_retrospectives: "weekly"
    
  integration:
    primary_communication: "telegram_group_chat"
    task_tracking: "shared/TASKBOARD.md"
    file_sharing: "google_drive_shared_folders"
    code_repository: "github.com/jcrowan3/"
    monitoring_dashboard: "streamlit_app"  # Future enhancement